name: MBOT

on:
  workflow_dispatch: 
    inputs:

      sites:
        description: 'I Drive Site (Fastest JF)'
        type: choice
        options:
          - JF
          - PG
          - FM
          - IDC
          - BA
        required: true

      name:
        description: 'MV_json_file or FULL - rev1'
        # Default value if no value is explicitly provided
        default: 'FULL'
        # Input has to be provided for the workflow to run
        required: true

      targetbom:
        description: 'Option: Class_NVL_S28C | ALL | If running multi boms, using comma delimiter'
        # Default value if no value is explicitly provided
        default: 'Class_NVL_S28C'
        # Input has to be provided for the workflow to run
        required: true

      destination:
        description: 'I:/ path to copy TP. Leave alone to not copy.'
        # Default value if no value is explicitly provided
        default: 'I:/'
        # Input has to be provided for the workflow to run
        required: true

      quickbuild:
        description: 'QuickBuild mode (SD only): no checks'
        type: boolean
        default: false

      special_socket:
        description: 'Enter special socket LOCN_STEP_ENGID Ex: 6248_CSM_AF| 6248_CSM | 7822'
        # Default value if no value is explicitly provided
        default: 'NONE'
        # Input has to be provided for the workflow to run
        required: true

      tester:
        description: 'Enter tester name if you want to request a specific tester. Array mapping: any OR comma-separated list matching BOM count'
        # Default value if no value is explicitly provided
        default: 'any'
        # Input has to be provided for the workflow to run
        required: true

      DieletBranches:
        description: 'Branchname|tag|sha|none e.g.CPU;GCD;PCD;HUB'
        # Default value if no value is explicitly provided
        default: 'main;main;main;main'
        # Input has to be provided for the workflow to run
        required: true

      acpy:
        description: 'Auto Content pymtpl I:\ path:'
        default: 'None'
        required: false

      email:
        description: 'Email address'
        # Default value if no value is explicitly provided
        default: ''
        # Input has to be provided for the workflow to run
        required: true


jobs:
  validate-and-filter:
    name: Validate Input and Filter BOMs
    runs-on:
    - self-hosted
    - checkers_${{ inputs.sites }}
    timeout-minutes: 10
    outputs:
      bom-matrix: ${{ steps.filter.outputs.bom-matrix }}
      tester-mapping: ${{ steps.filter.outputs.tester-mapping }}
      cpu-branch: ${{ steps.parse-branches.outputs.CPU_Branch }}
      gcd-branch: ${{ steps.parse-branches.outputs.GCD_Branch }}
      pcd-branch: ${{ steps.parse-branches.outputs.PCD_Branch }}
      hub-branch: ${{ steps.parse-branches.outputs.HUB_Branch }}

    steps:
    - name: Parse Dielet Branches
      id: parse-branches
      shell: powershell
      run: |
        $inputBranches = "${{ inputs.DieletBranches }}"
        Write-Host "Raw DieletBranches input: '$inputBranches'"
        
        # Handle both semicolon and line break separators
        $branches = $inputBranches -split '[;\r\n]+' | Where-Object { $_.Trim() -ne '' }
        Write-Host "Split branches: $($branches -join ', ')"
        
        $CPU_Branch = if ($branches[0]) { $branches[0].Trim() } else { "main" }
        $GCD_Branch = if ($branches[1]) { $branches[1].Trim() } else { "main" }
        $PCD_Branch = if ($branches[2]) { $branches[2].Trim() } else { "main" }
        $HUB_Branch = if ($branches[3]) { $branches[3].Trim() } else { "main" }
        
        echo "CPU_Branch=$CPU_Branch" >> $env:GITHUB_OUTPUT
        echo "GCD_Branch=$GCD_Branch" >> $env:GITHUB_OUTPUT
        echo "PCD_Branch=$PCD_Branch" >> $env:GITHUB_OUTPUT
        echo "HUB_Branch=$HUB_Branch" >> $env:GITHUB_OUTPUT
        Write-Host "Parsed branches: CPU=$CPU_Branch, GCD=$GCD_Branch, PCD=$PCD_Branch, HUB=$HUB_Branch"

    - name: Validate and filter BOMs
      id: filter
      shell: powershell
      run: |
        # ============================================
        # MULTISWITCH CONFIGURATION (ADMIN ONLY)
        # 1 = Enable Multiple BOMs/Testers (Original functionality)
        # 0 = Disable Multiple BOMs/Testers (Single BOM/Tester only)
        # ============================================
        $multiSwitch = 1
        # ============================================

        $targetBom = "${{ inputs.targetbom }}"
        $testerInput = "${{ inputs.tester }}"

        Write-Host "Starting BOM validation and filtering for COMMON workflow..."
        Write-Host "Target BOM input: $targetBom"
        Write-Host "Tester input: $testerInput"
        Write-Host "Site: ${{ inputs.sites }}"
        Write-Host "MultiSwitch: $multiSwitch (1=Multiple BOMs/Testers Enabled, 0=Single BOM/Tester Only)"

        # Define all available BOMs for COMMON workflow
        $allBoms = @(
          @{ name = "NS28C"; class = "Class_NVL_S28C"; bot_runner = "nvl2_mbot._ALL_.nvl_common" },
          @{ name = "NS52C"; class = "Class_NVL_S52C"; bot_runner = "nvl2_mbot._ALL_.nvl_common" },
          @{ name = "NHX28C"; class = "Class_NVL_HX28C"; bot_runner = "nvl2_mbot._ALL_.nvl_common" },
          @{ name = "NH16C"; class = "Class_NVL_H16C"; bot_runner = "nvl2_mbot._ALL_.nvl_common" },
          @{ name = "NP16C"; class = "Class_NVL_P16C"; bot_runner = "nvl2_mbot._ALL_.nvl_common" },
          @{ name = "NS16C"; class = "Class_NVL_S16C"; bot_runner = "nvl2_mbot._ALL_.nvl_common" },
          @{ name = "NU8C"; class = "Class_NVL_U8C"; bot_runner = "nvl2_mbot._ALL_.nvl_common.nvlhx28c" },
          @{ name = "DS28C"; class = "Class_DNL_S28C"; bot_runner = "nvl2_mbot._ALL_.nvl_common" }
        )

        Write-Host "Total available BOMs for COMMON: $($allBoms.Count)"

        # MultiSwitch validation - Check for multiple BOMs/Testers when disabled
        if ($multiSwitch -eq 0) {
            Write-Host ""
            Write-Host "MultiSwitch is DISABLED (0) - Enforcing single BOM and single tester only"

            # Check for multiple BOMs
            if ($targetBom -eq "ALL") {
                Write-Host "ERROR: Single Mode is enabled - 'ALL' BOMs option is not available"
                Write-Host "Please select ONE specific BOM class from: $($allBoms.class -join ', ')"
                Write-Host "Example: Use 'Class_NVL_S28C' instead of 'ALL'"
                exit 1
            }

            $targetClasses = $targetBom -split ',' | ForEach-Object { $_.Trim() } | Where-Object { -not [string]::IsNullOrEmpty($_) }
            if ($targetClasses.Count -gt 1) {
                Write-Host "ERROR: Single Mode is enabled - Multiple BOMs detected: $($targetClasses -join ', ')"
                Write-Host "Please select only ONE BOM class"
                Write-Host "Example: Use 'Class_NVL_S28C' instead of 'Class_NVL_S28C,Class_NVL_S52C'"
                exit 1
            }

            # Check for multiple testers
            $cleanTesterInput = $testerInput.Trim()
            if ($cleanTesterInput -like "*,*") {
                $testerList = @($cleanTesterInput -split ',' | ForEach-Object { $_.Trim() } | Where-Object { -not [string]::IsNullOrEmpty($_) })
                if ($testerList.Count -gt 1) {
                    Write-Host "ERROR: Single Mode is enabled - Multiple testers detected: $($testerList -join ', ')"
                    Write-Host "Please use only ONE tester option: 'any' or a single tester name"
                    Write-Host "Example: Use 'any' instead of 'PG,JF'"
                    exit 1
                }
            }

            Write-Host "MultiSwitch validation passed - Single BOM and single tester configuration detected"
        } else {
            Write-Host ""
            Write-Host "MultiSwitch is ENABLED (1) - Multiple BOMs and testers are allowed"
        }

        # Filter BOMs based on target
        if ($targetBom -eq "ALL") {
            $filteredBoms = $allBoms
            Write-Host "Target: ALL - will run all COMMON BOMs"
        } else {
            $targetClasses = $targetBom -split ',' | ForEach-Object { $_.Trim() }
            $filteredBoms = @($allBoms | Where-Object { $targetClasses -contains $_.class })
            Write-Host "Target: Specific BOMs - filtering for COMMON..."
        }

        Write-Host "Filtered BOMs: $($filteredBoms.Count) out of $($allBoms.Count)"
        $filteredBoms | ForEach-Object { Write-Host "  - $($_.name) ($($_.class))" }
        
        if ($filteredBoms.Count -eq 0) {
            Write-Host "ERROR: No valid BOMs found for target: $targetBom"
            Write-Host "Available BOM classes for COMMON: $($allBoms.class -join ', ')"
            exit 1
        }

        # Additional MultiSwitch validation after filtering
        if ($multiSwitch -eq 0 -and $filteredBoms.Count -gt 1) {
            Write-Host "ERROR: MultiSwitch is disabled but filtering resulted in multiple BOMs"
            Write-Host "Filtered BOMs: $($filteredBoms.class -join ', ')"
            Write-Host "This should not happen - please check BOM filtering logic"
            exit 1
        }

        # Validate tester configuration
        $cleanTesterInput = $testerInput.Trim()
        $testerMapping = @{}

        Write-Host ""
        Write-Host "Validating tester configuration for COMMON workflow..."

        if ($cleanTesterInput -eq "any") {
            # Single 'any' - applies to all BOMs
            foreach ($bom in $filteredBoms) {
                $testerMapping[$bom.class] = "any"
            }
            Write-Host "Tester mapping: All BOMs -> 'any'"
        } elseif ($cleanTesterInput -like "*,*") {
            # Multiple testers - must match BOM count
            $testerList = @($cleanTesterInput -split ',' | ForEach-Object { 
                $trimmed = $_.Trim()
                if ([string]::IsNullOrEmpty($trimmed)) {
                    Write-Host "WARNING: Found empty tester entry in comma-separated list"
                }
                $trimmed
            } | Where-Object { -not [string]::IsNullOrEmpty($_) })

            Write-Host "Multiple testers detected: $($testerList -join ', ')"
            Write-Host "BOM count: $($filteredBoms.Count), Tester count: $($testerList.Count)"

            if ($testerList.Count -ne $filteredBoms.Count) {
                Write-Host ""
                Write-Host "ERROR: Tester count mismatch for COMMON workflow!"
                Write-Host "Reading detailed error message from tester_selection_error.md..."

                # Show detailed error with .md file from I:\ drive
                try {
                    $errorContent = Get-Content -Path "I:\tpvalidation\engtools\tptools\mtl\infra\torch\botos\example_error\tester_selection_error.md" -Raw
                    $errorContent = $errorContent -replace '\{BOMLIST\}', ($filteredBoms.class -join ', ')
                    $errorContent = $errorContent -replace '\{TESTERLIST\}', ($testerList -join ', ')
                    $errorContent = $errorContent -replace '\{BOMCOUNT\}', $filteredBoms.Count
                    $errorContent = $errorContent -replace '\{TESTERCOUNT\}', $testerList.Count
                    $errorContent = $errorContent -replace '\{ALLMATRIXBOMS\}', ($allBoms.class -join ', ')
                    $errorContent = $errorContent -replace '\{TOTALMATRIXCOUNT\}', $allBoms.Count
                    Write-Host $errorContent
                } catch {
                    Write-Host "Could not read tester_selection_error.md file from I:\ drive path."
                    Write-Host "Using fallback error message for COMMON workflow."
                    Write-Host "ERROR: Tester count ($($testerList.Count)) does not match BOM count ($($filteredBoms.Count))"
                    Write-Host "Target BOMs: $($filteredBoms.class -join ', ')"
                    Write-Host "Tester Input: $($testerList -join ', ')"
                    Write-Host "Available Matrix BOMs: $($allBoms.class -join ', ')"
                    Write-Host ""
                    Write-Host "Examples of correct usage:"
                    Write-Host "- Single 'any': tester='any'"
                    Write-Host "- Exact match: For $($filteredBoms.Count) BOMs, provide $($filteredBoms.Count) testers"
                    Write-Host "- Current BOMs: $($filteredBoms.class -join ',')"
                    Write-Host "- Example fix: tester='$($testerList -join ','),any'"
                }
                exit 1
            }

            # Map testers by position (array mapping)
            for ($i = 0; $i -lt $filteredBoms.Count; $i++) {
                $testerMapping[$filteredBoms[$i].class] = $testerList[$i]
                Write-Host "Array mapping - BOM '$($filteredBoms[$i].class)' at index $i -> Tester: '$($testerList[$i])'"
            }
        } else {
            # Single tester for all BOMs
            foreach ($bom in $filteredBoms) {
                $testerMapping[$bom.class] = $cleanTesterInput
            }
            Write-Host "Tester mapping: All BOMs -> '$cleanTesterInput'"
        }

        Write-Host ""
        Write-Host "Final tester assignments for COMMON:"
        foreach ($bom in $filteredBoms) {
            Write-Host "  - $($bom.name) ($($bom.class)) -> $($testerMapping[$bom.class])"
        }

        if ($filteredBoms.Count -eq 1) {
            # For single item, manually create array JSON format
            $bomMatrix = "[$($filteredBoms[0] | ConvertTo-Json -Compress)]"
        } else {
            # For multiple items, normal array conversion
            $bomMatrix = $filteredBoms | ConvertTo-Json -Compress
        }
        $testerMappingJson = $testerMapping | ConvertTo-Json -Compress

        Write-Host ""
        Write-Host "DEBUG: BOM Matrix JSON: $bomMatrix"
        Write-Host "DEBUG: Tester Mapping JSON: $testerMappingJson"

        echo "bom-matrix=$bomMatrix" >> $env:GITHUB_OUTPUT
        echo "tester-mapping=$testerMappingJson" >> $env:GITHUB_OUTPUT

        Write-Host ""
        Write-Host "COMMON workflow validation completed successfully!"
        Write-Host "Will proceed to run $($filteredBoms.Count) BOM(s)"
        if ($multiSwitch -eq 0) {
            Write-Host "MultiSwitch Mode: SINGLE (0) - Only one BOM and one tester allowed"
        } else {
            Write-Host "MultiSwitch Mode: MULTIPLE (1) - Multiple BOMs and testers allowed"
        }

  MBOT:
    name: MBOT_${{ matrix.bom.name }}
    runs-on:
    - self-hosted
    - checkers_${{ inputs.sites }}
    timeout-minutes: 180
    needs: validate-and-filter
    if: needs.validate-and-filter.outputs.bom-matrix != '[]'

    strategy:
      fail-fast: false
      matrix:
        bom: ${{ fromJson(needs.validate-and-filter.outputs.bom-matrix) }}

    steps:
    - name: Get assigned tester
      id: should-run
      shell: powershell
      run: |
        $testerMapping = '${{ needs.validate-and-filter.outputs.tester-mapping }}' | ConvertFrom-Json
        $assignedTester = $testerMapping.'${{ matrix.bom.class }}'

        Write-Host "COMMON BOM: ${{ matrix.bom.name }} (${{ matrix.bom.class }})"
        Write-Host "Assigned tester: $assignedTester"

        # This BOM was pre-validated, so it should always run
        echo "should-run=true" >> $env:GITHUB_OUTPUT
        echo "tester=$assignedTester" >> $env:GITHUB_OUTPUT

    - name: Log Inputs
      shell: powershell
      run: |
        $inputs = @'
        ${{ toJSON(inputs) }}
        '@
        Write-Host "Inputs: $inputs"
        Write-Host "Running COMMON BOM: ${{ matrix.bom.name }} (${{ matrix.bom.class }})"
        Write-Host "Bot Runner: ${{ matrix.bom.bot_runner }}"
        Write-Host "Assigned Tester: ${{ steps.should-run.outputs.tester }}"
        Write-Host "Dielet Branches: CPU=${{ needs.validate-and-filter.outputs.cpu-branch }}, GCD=${{ needs.validate-and-filter.outputs.gcd-branch }}, PCD=${{ needs.validate-and-filter.outputs.pcd-branch }}, HUB=${{ needs.validate-and-filter.outputs.hub-branch }}"

    - name: i drive check
      shell: powershell
      run: >
        python -c "import os, socket;
        assert os.path.isdir('I:/tpvalidation'),
        f'I:/ drive is not accessible. Pls contact TPD to fix drive mapping on {socket.gethostname()} right away.'"

    - name: repo_init_check
      if: steps.should-run.outputs.should-run == 'true'
      continue-on-error: true
      shell: powershell
      run: python -u I:/tpvalidation/engtools/tptools/mtl/beta/gen1/main/tprobot.py REPO_INIT main
      env:
         GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - uses: actions/checkout@v6
      if: steps.should-run.outputs.should-run == 'true'
      with: 
        fetch-depth: 0
        clean: true              # remove untracked files before checkout
        ref: ${{ github.event.pull_request.head.ref }}

    - name: Checkout submodules
      if: steps.should-run.outputs.should-run == 'true'
      shell: powershell
      run: |
        git submodule sync --recursive
        git submodule update --init --recursive --force

    - name: clone dielets
      if: steps.should-run.outputs.should-run == 'true' && inputs.name != 'ASIS' && inputs.name != 'ASIS_LOCAL' && inputs.name != 'NOLOAD'
      shell: powershell
      run: python I:/tpvalidation/engtools/tptools/mtl/beta/gen1/main/nvl_buildtp.py ${{ matrix.bom.class }} -clone
      env:
         CPU_Branch: ${{ needs.validate-and-filter.outputs.cpu-branch }}
         GCD_Branch: ${{ needs.validate-and-filter.outputs.gcd-branch }}
         PCD_Branch: ${{ needs.validate-and-filter.outputs.pcd-branch }}
         HUB_Branch: ${{ needs.validate-and-filter.outputs.hub-branch }}
         GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Bot run
      if: steps.should-run.outputs.should-run == 'true'
      shell: powershell
      run: python -u I:/tpvalidation/engtools/tptools/mtl/beta/gen1/main/runner_botos.py ${{ matrix.bom.bot_runner }}
      env:
          DEST: ${{ inputs.destination }}
          EMAIL: ${{ inputs.email }}
          IN1: ${{ inputs.name }}
          TESTER: ${{ steps.should-run.outputs.tester }}
          SPECIAL_SOCKET: ${{ inputs.special_socket }}
          TARGETBOM: ${{ matrix.bom.class }}
          CLEANTP: True
          QUICKBUILD: ${{ inputs.quickbuild }}
          ACPY: ${{ inputs.acpy }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CPU_Branch: ${{ needs.validate-and-filter.outputs.cpu-branch }}
          GCD_Branch: ${{ needs.validate-and-filter.outputs.gcd-branch }}
          PCD_Branch: ${{ needs.validate-and-filter.outputs.pcd-branch }}
          HUB_Branch: ${{ needs.validate-and-filter.outputs.hub-branch }}
