name: Copilot Coding Agent Task
description: Assign a coding task to the AI coding agent for this repository
title: "[Coding Agent Task]: "
labels: ["copilot-coding-agent"]
assignees: []
body:

  - type: markdown
    attributes:
      value: |
        ## Coding Agent Template
        This template helps you assign structured coding tasks to the AI agent. Please fill out all required sections with as much detail as possible.

  - type: dropdown
    id: task-type
    attributes:
      label: Task Type
      description: What type of work does this task involve?
      options:
        - Module Update
        - ProgramFlows Update
        - Prime Changes
        - Code Cleanup
        - Infrastructure change
        - Other
    validations:
      required: true

  - type: textarea
    id: BOM
    attributes:
      label: Product BOM
      description: Which product is this task related to?
      placeholder: |
        Example:
        - Class_DNL_S28C
        - Class_NVL_HX28C
        - Class_NVL_P16C
        - Class_NVL_S16C
        - Class_NVL_S28C
        - Class_NVL_S52C
    validations:
      required: false

  - type: textarea
    id: task-description
    attributes:
      label: Task Description
      description: Clearly describe what needs to be done. Be specific about the problem or feature.
      placeholder: |
        Example:
        - Update the FUN_CORE module to bypass TEST_A
        - Update programflows to add module flow to new flow
        - TP Bot related changes
    validations:
      required: true

  - type: textarea
    id: target-files
    attributes:
      label: Target Files/Locations
      description: List the files or directories that should be modified. Use checkboxes for tracking.
      placeholder: |
        Example:
        - [ ] Modules/FUN/FUN_CORE_CX816/FUN_CORE_CX816.py
        - [ ] POR_TP/Class_NVL_S28CProgramFlowsTestPlan/IPC_FLOWS.py
        - [ ] Shared/Modules/TPI/TPI_END_XXX/TPI_END_XXX.py

    validations:
      required: true

  - type: textarea
    id: expected-changes
    attributes:
      label: Expected Changes
      description: Describe the specific modifications needed for each file. What should change and how?
      placeholder: |
        Example:
        - [ ] Modules/FUN/FUN_CORE_CX816/FUN_CORE_CX816.py - Add a new TEST_A in FLOW_A
        - [ ] POR_TP/Class_NVL_S28CProgramFlowsTestPlan/IPC_FLOWS.py - Update Program flows to include new module flow
        - [ ] Shared/Modules/TPI/TPI_END_XXX/TPI_END_XXX.py - Add a new Module to the TPI_END_XXX module
    validations:
      required: true

  - type: textarea
    id: success-criteria
    attributes:
      label: Success Criteria
      description: Define what the final output should contain or look like. How will we know this is complete?
      placeholder: |
        Example:
        - [ ] All existing unit tests pass
        - [ ] New unit tests added with >90% coverage
        - [ ] Code formatted with autopep8
        - [ ] No regression in template processing performance
        - [ ] Documentation updated if API changes
    validations:
      required: true


  - type: textarea
    id: implementation-guidelines
    attributes:
      label: Implementation Guidelines
      description: Provide specific approaches, patterns for implementation. How would you solve this if you were coding it?
      placeholder: |
        Example:
        - Add the test TEST_A I asked for AFTER TEST_B and ensure the parameters for it are the same as TEST_B.
        - Make sure the exit ports for the new programflows update match the existing modules in that flow etc.
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Provide any links, examples, error messages, or references that may help the AI agent understand the task better.
      placeholder: |
        Example:
        - Link to related issue: #123
        - Error message: "ValueError: Invalid template syntax at line 45"
        - Reference implementation: /path/to/example/file.py
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ### Instructions for AI Coding Agent
    
        Instructions to the AI Agent working on the task:
        - Review all referenced files before making changes
        - Follow existing code style and patterns
        - Comment code where logic is complex
        - Read the relevant Instructions files for Pymtpl and ProgramFlows modifications before proceeding.
        - Summarize changes in the PR description. You MUST follow the repository's PR template if present.
        - Pymtpl files are typically .py files and will contain an InitializeNVLClass call in them.
        - ProgramFlows files are typically .py files and are present in POR_TP/<Product>/ProgramFlowsTestPlan/ directories.